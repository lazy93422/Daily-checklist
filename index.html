<body>
  <article class="page">
    <div class="card">
      <header>
        <p class="eyebrow">DAILY CHECKLIST</p>
        <h1>每日习惯打卡</h1>
        <div class="date-row" aria-label="日期信息">
          <div class="date-pill">
            日期
            <span id="todayText">加载中...</span>
          </div>
          <button class="today-button" type="button" id="resetToday">切换到今天</button>
        </div>
      </header>

      <main>
        <nav class="tabs" aria-label="页面选项卡">
          <button class="tab-button active" type="button" data-tab="todayPanel">今日打卡</button>
          <button class="tab-button" type="button" data-tab="overviewPanel">统计</button>
        </nav>

        <section class="panel active" id="todayPanel">
          <p class="hint">点击每个项目即可勾选或取消勾选，勾选状态会自动保存在当前浏览器中。</p>

          <section class="items" id="itemsList" aria-label="每日项目"></section>

          <div class="summary">
            <div class="summary-text" id="summaryText">已勾选 0 / 0 项</div>
            <button class="clear-button danger-button" type="button" id="clearChecks">清空今日勾选</button>
          </div>

          <details class="manage-box" aria-label="管理打卡内容">
            <summary class="manage-summary">
              <span class="manage-title">管理打卡内容</span>
            </summary>
            <div class="manage-content">
              <p class="hint">你可以新增、编辑或删除自己的打卡项目。编辑名称会保留原来的历史数据；删除项目会同时移除该项目的历史数据。</p>
              <div class="add-row">
                <input class="text-input" type="text" id="newItemInput" placeholder="输入新的打卡内容，例如：今天喝水了">
                <button class="primary-button" type="button" id="addItem">新增</button>
              </div>
              <div class="manage-list" id="manageList"></div>
            </div>
          </details>
        </section>

        <section class="panel" id="overviewPanel">
          <div class="overview-head">
            <div>
              <h2 class="overview-title">历史打卡总览</h2>
              <div class="overview-count" id="overviewCount">暂无历史记录</div>
            </div>
            <div class="overview-actions">
              <button class="secondary-button" type="button" id="refreshOverview">刷新总览</button>
              <button class="primary-button" type="button" id="exportExcel">导出 Excel</button>
            </div>
          </div>
          <section class="stats-grid" id="overviewStats" aria-label="打卡统计"></section>
          <section class="trend-card" id="trendChart" aria-label="打卡趋势图"></section>
          <div class="history-list" id="historyList"></div>
        </section>
      </main>
    </div>
  </article>

  <script>
    (function () {
      var date = new Date();
      var dateKey = "";
      var defaultItems = [
        { key: "smoking", label: "今天没抽烟" },
        { key: "drinking", label: "今天没喝酒" },
        { key: "exercise", label: "今天运动了" },
        { key: "sleep_early", label: "今天早睡了" }
      ];
      var items = [];
      var itemsList = document.getElementById("itemsList");
      var manageList = document.getElementById("manageList");
      var newItemInput = document.getElementById("newItemInput");
      var todayText = document.getElementById("todayText");
      var summaryText = document.getElementById("summaryText");
      var historyList = document.getElementById("historyList");
      var overviewCount = document.getElementById("overviewCount");
      var overviewStats = document.getElementById("overviewStats");
      var trendChart = document.getElementById("trendChart");
      var selectedOverviewDate = "";
      var overviewMonthDate = null;

      function pad(value) {
        return String(value).padStart(2, "0");
      }

      function makeDateKey(currentDate) {
        return currentDate.getFullYear() + "-" + pad(currentDate.getMonth() + 1) + "-" + pad(currentDate.getDate());
      }

      function formatDate(currentDate) {
        var weekDays = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        return currentDate.getFullYear() + "年" + pad(currentDate.getMonth() + 1) + "月" + pad(currentDate.getDate()) + "日 " + weekDays[currentDate.getDay()];
      }

      function formatDateKey(targetDateKey) {
        var parts = targetDateKey.split("-");
        return parts[0] + "年" + parts[1] + "月" + parts[2] + "日";
      }

      function parseDateKey(targetDateKey) {
        var parts = targetDateKey.split("-").map(Number);
        return new Date(parts[0], parts[1] - 1, parts[2]);
      }

      function storageKey(key) {
        return "daily-checklist:" + dateKey + ":" + key;
      }

      function storageKeyByDate(targetDateKey, itemKey) {
        return "daily-checklist:" + targetDateKey + ":" + itemKey;
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function saveItems() {
        localStorage.setItem("daily-checklist:items", JSON.stringify(items));
      }

      function loadItems() {
        var stored = localStorage.getItem("daily-checklist:items");
        if (!stored) {
          items = defaultItems.slice();
          saveItems();
          return;
        }

        try {
          var parsed = JSON.parse(stored);
          if (Array.isArray(parsed) && parsed.length > 0) {
            items = parsed.filter(function (item) {
              return item && item.key && item.label;
            });
          } else {
            items = defaultItems.slice();
          }
        } catch (error) {
          items = defaultItems.slice();
        }

        items = items.map(function (item) {
          var defaultItem = defaultItems.find(function (current) {
            return current.key === item.key;
          });
          if (defaultItem && (
            item.label === "是否抽烟" ||
            item.label === "是否喝酒" ||
            item.label === "是否运动" ||
            item.label === "是否早睡"
          )) {
            return {
              key: item.key,
              label: defaultItem.label
            };
          }
          return item;
        });

        saveItems();
      }

      function makeCustomKey() {
        return "custom_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
      }

      function getHistoryDates() {
        var dateMap = {};
        var pattern = /^daily-checklist:(\d{4}-\d{2}-\d{2}):/;

        for (var index = 0; index < localStorage.length; index += 1) {
          var key = localStorage.key(index);
          var match = key && key.match(pattern);
          if (match) {
            dateMap[match[1]] = true;
          }
        }

        return Object.keys(dateMap).sort().reverse();
      }

      function updateStatus() {
        var inputs = Array.prototype.slice.call(itemsList.querySelectorAll("input[type='checkbox']"));
        var checkedCount = 0;

        inputs.forEach(function (input) {
          var status = input.parentElement.querySelector(".status");
          if (input.checked) {
            checkedCount += 1;
            status.textContent = "已勾选";
          } else {
            status.textContent = "未勾选";
          }
        });

        summaryText.textContent = "已勾选 " + checkedCount + " / " + inputs.length + " 项";
        renderOverview();
      }

      function renderChecklist() {
        itemsList.innerHTML = "";

        if (items.length === 0) {
          itemsList.innerHTML = '<div class="empty-state">还没有打卡项目，请先在下方新增。</div>';
          updateStatus();
          return;
        }

        items.forEach(function (item) {
          var label = document.createElement("label");
          label.className = "item";
          label.innerHTML =
            '<input type="checkbox" data-key="' + escapeHtml(item.key) + '">' +
            '<span class="check" aria-hidden="true"></span>' +
            '<span class="label-text">' + escapeHtml(item.label) + '</span>' +
            '<span class="status">未勾选</span>';

          var input = label.querySelector("input");
          input.checked = localStorage.getItem(storageKey(item.key)) === "true";
          input.addEventListener("change", function () {
            localStorage.setItem(storageKey(item.key), String(input.checked));
            updateStatus();
          });

          itemsList.appendChild(label);
        });

        updateStatus();
      }

      function renderManageList() {
        manageList.innerHTML = "";

        if (items.length === 0) {
          manageList.innerHTML = '<div class="empty-state">暂无可管理项目。</div>';
          return;
        }

        items.forEach(function (item) {
          var row = document.createElement("div");
          row.className = "manage-item";
          row.innerHTML =
            '<div class="manage-name">' + escapeHtml(item.label) + '</div>' +
            '<button class="small-button" type="button" data-action="edit">编辑</button>' +
            '<button class="small-button danger-button" type="button" data-action="delete">删除</button>';

          row.querySelector('[data-action="edit"]').addEventListener("click", function () {
            var nextLabel = window.prompt("请输入新的打卡内容名称：", item.label);
            if (!nextLabel) {
              return;
            }
            nextLabel = nextLabel.trim();
            if (!nextLabel) {
              window.alert("名称不能为空。");
              return;
            }
            item.label = nextLabel;
            saveItems();
            renderAll();
          });

          row.querySelector('[data-action="delete"]').addEventListener("click", function () {
            var confirmed = window.confirm("确定删除“" + item.label + "”吗？该项目的历史数据也会被删除。");
            if (!confirmed) {
              return;
            }
            removeItemHistory(item.key);
            items = items.filter(function (current) {
              return current.key !== item.key;
            });
            saveItems();
            renderAll();
          });

          manageList.appendChild(row);
        });
      }

      function removeItemHistory(itemKey) {
        var keysToRemove = [];
        var pattern = new RegExp("^daily-checklist:\\d{4}-\\d{2}-\\d{2}:" + itemKey + "$");

        for (var index = 0; index < localStorage.length; index += 1) {
          var key = localStorage.key(index);
          if (key && pattern.test(key)) {
            keysToRemove.push(key);
          }
        }

        keysToRemove.forEach(function (key) {
          localStorage.removeItem(key);
        });
      }

      function addItem() {
        var label = newItemInput.value.trim();
        if (!label) {
          window.alert("请输入打卡内容。");
          return;
        }

        items.push({
          key: makeCustomKey(),
          label: label
        });
        newItemInput.value = "";
        saveItems();
        renderAll();
      }

      function getCheckedCountByDate(targetDateKey) {
        return items.reduce(function (sum, item) {
          return sum + (localStorage.getItem(storageKeyByDate(targetDateKey, item.key)) === "true" ? 1 : 0);
        }, 0);
      }

      function renderSelectedDayDetail(targetDateKey) {
        var checkedCount = getCheckedCountByDate(targetDateKey);
        var itemHtml = items.map(function (item) {
          var checked = localStorage.getItem(storageKeyByDate(targetDateKey, item.key)) === "true";
          return '<div class="history-item ' + (checked ? "done" : "") + '">' +
            '<span>' + escapeHtml(item.label) + '</span>' +
            '<strong>' + (checked ? "已勾选" : "未勾选") + '</strong>' +
            '</div>';
        }).join("");

        return '<section class="day-detail">' +
          '<div class="day-detail-title">' +
            '<div class="history-date">' + escapeHtml(formatDateKey(targetDateKey)) + '</div>' +
            '<div class="history-score">已勾选 ' + checkedCount + ' / ' + items.length + ' 项</div>' +
          '</div>' +
          '<div class="history-items">' + itemHtml + '</div>' +
        '</section>';
      }

      function renderCalendar(dates) {
        if (!selectedOverviewDate || dates.indexOf(selectedOverviewDate) === -1) {
          selectedOverviewDate = dates[0];
        }

        if (!overviewMonthDate) {
          overviewMonthDate = parseDateKey(selectedOverviewDate);
        }

        var year = overviewMonthDate.getFullYear();
        var month = overviewMonthDate.getMonth();
        var firstDay = new Date(year, month, 1).getDay();
        var daysInMonth = new Date(year, month + 1, 0).getDate();
        var weekdays = ["日", "一", "二", "三", "四", "五", "六"];
        var dateSet = {};
        dates.forEach(function (targetDateKey) {
          dateSet[targetDateKey] = true;
        });

        var calendarHtml =
          '<section class="calendar-section" aria-label="按日历查看打卡详情">' +
            '<div class="calendar-head">' +
              '<div>' +
                '<div class="calendar-title">' + year + '年' + pad(month + 1) + '月</div>' +
                '<div class="stat-note">点击有颜色的日期查看当天详情。</div>' +
              '</div>' +
              '<div class="calendar-nav">' +
                '<button class="small-button" type="button" id="prevMonth">上个月</button>' +
                '<button class="small-button" type="button" id="nextMonth">下个月</button>' +
              '</div>' +
            '</div>' +
            '<div class="calendar-grid">';

        calendarHtml += weekdays.map(function (weekday) {
          return '<div class="calendar-weekday">' + weekday + '</div>';
        }).join("");

        for (var blank = 0; blank < firstDay; blank += 1) {
          calendarHtml += '<div class="calendar-empty" aria-hidden="true"></div>';
        }

        for (var day = 1; day <= daysInMonth; day += 1) {
          var targetDateKey = year + "-" + pad(month + 1) + "-" + pad(day);
          var hasRecord = !!dateSet[targetDateKey];
          var selected = targetDateKey === selectedOverviewDate;
          var checkedCount = hasRecord ? getCheckedCountByDate(targetDateKey) : 0;

          calendarHtml += '<button class="calendar-day ' +
            (hasRecord ? "has-record " : "") +
            (selected ? "selected" : "") +
            '" type="button" ' +
            (hasRecord ? 'data-date-key="' + targetDateKey + '"' : 'disabled') +
            '>' +
              '<span>' + day + '</span>' +
              (hasRecord ? '<span class="day-score">' + checkedCount + '/' + items.length + '</span>' : '<span class="day-score">&nbsp;</span>') +
            '</button>';
        }

        calendarHtml += '</div>' + renderSelectedDayDetail(selectedOverviewDate) + '</section>';
        historyList.innerHTML = calendarHtml;

        document.getElementById("prevMonth").addEventListener("click", function () {
          overviewMonthDate = new Date(year, month - 1, 1);
          renderCalendar(dates);
        });

        document.getElementById("nextMonth").addEventListener("click", function () {
          overviewMonthDate = new Date(year, month + 1, 1);
          renderCalendar(dates);
        });

        Array.prototype.slice.call(historyList.querySelectorAll(".calendar-day.has-record")).forEach(function (button) {
          button.addEventListener("click", function () {
            selectedOverviewDate = button.dataset.dateKey;
            overviewMonthDate = parseDateKey(selectedOverviewDate);
            renderCalendar(dates);
          });
        });
      }

      function renderTrendChart(dates) {
        var ascendingDates = dates.slice().sort();
        var values = ascendingDates.map(function (targetDateKey) {
          return getCheckedCountByDate(targetDateKey);
        });
        var maxValue = Math.max(items.length, 1);
        var width = Math.max(560, ascendingDates.length * 72 + 96);
        var height = 300;
        var paddingLeft = 54;
        var paddingRight = 28;
        var paddingTop = 34;
        var paddingBottom = 54;
        var chartWidth = width - paddingLeft - paddingRight;
        var chartHeight = height - paddingTop - paddingBottom;

        if (ascendingDates.length === 0) {
          trendChart.innerHTML =
            '<div class="trend-head">' +
              '<div>' +
                '<div class="trend-title">打卡趋势</div>' +
                '<div class="stat-note">暂无数据。</div>' +
              '</div>' +
            '</div>';
          return;
        }

        var points = ascendingDates.map(function (targetDateKey, index) {
          var x = ascendingDates.length === 1
            ? paddingLeft + chartWidth / 2
            : paddingLeft + (chartWidth * index) / (ascendingDates.length - 1);
          var y = paddingTop + chartHeight - (values[index] / maxValue) * chartHeight;
          return {
            date: targetDateKey,
            value: values[index],
            x: x,
            y: y
          };
        });

        var linePoints = points.map(function (point) {
          return point.x.toFixed(1) + "," + point.y.toFixed(1);
        }).join(" ");
        var areaPoints = paddingLeft + "," + (paddingTop + chartHeight) + " " +
          linePoints + " " +
          (paddingLeft + chartWidth) + "," + (paddingTop + chartHeight);
        var gridHtml = "";

        for (var tick = 0; tick <= maxValue; tick += 1) {
          var y = paddingTop + chartHeight - (tick / maxValue) * chartHeight;
          gridHtml += '<line class="trend-grid-line" x1="' + paddingLeft + '" y1="' + y.toFixed(1) + '" x2="' + (paddingLeft + chartWidth) + '" y2="' + y.toFixed(1) + '"></line>' +
            '<text class="trend-label" x="' + (paddingLeft - 12) + '" y="' + (y + 4).toFixed(1) + '" text-anchor="end">' + tick + '</text>';
        }

        var labelsHtml = points.map(function (point, index) {
          var shouldShow = ascendingDates.length <= 8 || index === 0 || index === ascendingDates.length - 1 || index % Math.ceil(ascendingDates.length / 6) === 0;
          if (!shouldShow) {
            return "";
          }
          return '<text class="trend-label" x="' + point.x.toFixed(1) + '" y="' + (height - 18) + '" text-anchor="middle">' + escapeHtml(point.date.slice(5)) + '</text>';
        }).join("");

        var pointsHtml = points.map(function (point) {
          return '<circle class="trend-point" cx="' + point.x.toFixed(1) + '" cy="' + point.y.toFixed(1) + '" r="6"></circle>' +
            '<text class="trend-value-label" x="' + point.x.toFixed(1) + '" y="' + (point.y - 12).toFixed(1) + '" text-anchor="middle">' + point.value + '</text>' +
            '<title>' + escapeHtml(formatDateKey(point.date)) + "：已勾选 " + point.value + " 项" + '</title>';
        }).join("");

        trendChart.innerHTML =
          '<div class="trend-head">' +
            '<div>' +
              '<div class="trend-title">打卡趋势</div>' +
              '<div class="stat-note">横轴为日期，纵轴为当天已勾选数量。</div>' +
            '</div>' +
            '<div class="history-score">最高 ' + Math.max.apply(null, values) + ' / ' + items.length + ' 项</div>' +
          '</div>' +
          '<div class="trend-wrap">' +
            '<svg class="trend-svg" viewBox="0 0 ' + width + ' ' + height + '" role="img" aria-label="每日打卡数量趋势图">' +
              gridHtml +
              '<line class="trend-axis" x1="' + paddingLeft + '" y1="' + (paddingTop + chartHeight) + '" x2="' + (paddingLeft + chartWidth) + '" y2="' + (paddingTop + chartHeight) + '"></line>' +
              '<line class="trend-axis" x1="' + paddingLeft + '" y1="' + paddingTop + '" x2="' + paddingLeft + '" y2="' + (paddingTop + chartHeight) + '"></line>' +
              '<polygon class="trend-area" points="' + areaPoints + '"></polygon>' +
              '<polyline class="trend-line" points="' + linePoints + '"></polyline>' +
              pointsHtml +
              labelsHtml +
            '</svg>' +
          '</div>';
      }

      function renderOverview() {
        var dates = getHistoryDates();
        historyList.innerHTML = "";
        overviewStats.innerHTML = "";
        trendChart.innerHTML = "";

        if (dates.length === 0) {
          overviewCount.textContent = "暂无历史记录";
          overviewStats.innerHTML =
            '<article class="stat-card highlight">' +
              '<div class="stat-label">累计打卡天数</div>' +
              '<div class="stat-value">0 天</div>' +
              '<div class="stat-note">开始勾选后，这里会自动统计。</div>' +
            '</article>';
          trendChart.innerHTML =
            '<div class="trend-head">' +
              '<div>' +
                '<div class="trend-title">打卡趋势</div>' +
                '<div class="stat-note">暂无数据。</div>' +
              '</div>' +
            '</div>';
          historyList.innerHTML = '<div class="empty-state">还没有保存过任何日期的打卡记录。</div>';
          return;
        }

        overviewCount.textContent = "共 " + dates.length + " 天记录";

        var totalCheckedCount = 0;
        var itemCounts = items.map(function (item) {
          var count = dates.reduce(function (sum, targetDateKey) {
            return sum + (localStorage.getItem(storageKeyByDate(targetDateKey, item.key)) === "true" ? 1 : 0);
          }, 0);
          totalCheckedCount += count;
          return {
            label: item.label,
            count: count
          };
        });

        var statsHtml =
          '<article class="stat-card highlight">' +
            '<div class="stat-label">累计打卡天数</div>' +
            '<div class="stat-value">' + dates.length + ' 天</div>' +
            '<div class="stat-note">包含所有有打卡记录的日期。</div>' +
          '</article>' +
          '<article class="stat-card highlight">' +
            '<div class="stat-label">累计勾选次数</div>' +
            '<div class="stat-value">' + totalCheckedCount + ' 次</div>' +
            '<div class="stat-note">所有项目的已勾选次数合计。</div>' +
          '</article>';

        statsHtml += itemCounts.map(function (item) {
          var percent = dates.length > 0 ? Math.round((item.count / dates.length) * 100) : 0;
          return '<article class="stat-card">' +
            '<div class="stat-label">' + escapeHtml(item.label) + '</div>' +
            '<div class="stat-value">' + item.count + ' 天</div>' +
            '<div class="stat-note">占总打卡天数 ' + percent + '%</div>' +
          '</article>';
        }).join("");

        overviewStats.innerHTML = statsHtml;
        renderTrendChart(dates);
        renderCalendar(dates);
      }

      function excelCell(value) {
        return escapeHtml(value == null ? "" : value);
      }

      function exportExcel() {
        var dates = getHistoryDates().sort();

        if (dates.length === 0) {
          window.alert("暂无可导出的打卡数据。");
          return;
        }

        var rows = [
          '<tr><th>日期</th><th>已勾选数量</th><th>总项目数</th>' +
          items.map(function (item) {
            return '<th>' + excelCell(item.label) + '</th>';
          }).join("") +
          '</tr>'
        ];

        dates.forEach(function (targetDateKey) {
          var checkedCount = 0;
          var cells = items.map(function (item) {
            var checked = localStorage.getItem(storageKeyByDate(targetDateKey, item.key)) === "true";
            if (checked) {
              checkedCount += 1;
            }
            return '<td>' + (checked ? "已勾选" : "未勾选") + '</td>';
          }).join("");

          rows.push(
            '<tr>' +
              '<td>' + excelCell(targetDateKey) + '</td>' +
              '<td>' + checkedCount + '</td>' +
              '<td>' + items.length + '</td>' +
              cells +
            '</tr>'
          );
        });

        var html =
          '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">' +
          '<head><meta charset="UTF-8"></head>' +
          '<body><table border="1">' + rows.join("") + '</table></body></html>';
        var blob = new Blob(["\ufeff" + html], { type: "application/vnd.ms-excel;charset=utf-8;" });
        var url = URL.createObjectURL(blob);
        var link = document.createElement("a");
        link.href = url;
        link.download = "每日习惯打卡数据_" + makeDateKey(new Date()) + ".xls";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      }

      function loadChecks() {
        dateKey = makeDateKey(date);
        todayText.textContent = formatDate(date);
        renderChecklist();
      }

      function renderAll() {
        renderChecklist();
        renderManageList();
        renderOverview();
      }

      document.getElementById("clearChecks").addEventListener("click", function () {
        items.forEach(function (item) {
          localStorage.removeItem(storageKey(item.key));
        });
        renderChecklist();
      });

      document.querySelectorAll(".tab-button").forEach(function (button) {
        button.addEventListener("click", function () {
          var targetId = button.dataset.tab;
          document.querySelectorAll(".tab-button").forEach(function (tab) {
            tab.classList.toggle("active", tab === button);
          });
          document.querySelectorAll(".panel").forEach(function (panel) {
            panel.classList.toggle("active", panel.id === targetId);
          });
          if (targetId === "overviewPanel") {
            renderOverview();
          }
        });
      });

      document.getElementById("refreshOverview").addEventListener("click", renderOverview);
      document.getElementById("exportExcel").addEventListener("click", exportExcel);
      document.getElementById("addItem").addEventListener("click", addItem);
      newItemInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          addItem();
        }
      });

      document.getElementById("resetToday").addEventListener("click", function () {
        date = new Date();
        loadChecks();
      });

      loadItems();
      loadChecks();
      renderManageList();
      renderOverview();
    })();
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./sw.js").catch(function () {
          console.log("Service Worker 注册失败，不影响网页正常使用。");
        });
      });
    }
  </script>
</body>
</html>
